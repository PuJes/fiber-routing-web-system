name: Build Standalone Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask flask-cors shapely pyinstaller

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --name FiberRoutingPlanner --onefile --windowed --add-data "static;static" server.py

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --name FiberRoutingPlanner --onefile --windowed --add-data "static:static" server.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FiberRoutingPlanner-${{ matrix.os }}
        path: |
          dist/FiberRoutingPlanner.exe
          dist/FiberRoutingPlanner.app
          dist/FiberRoutingPlanner
