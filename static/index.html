<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能光纤前勘 4.0 | 多路径交互拓扑版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        .map-container { height: 300px; width: 100%; border-radius: 0.5rem; }
        .network-container { height: 600px; width: 100%; border: 1px solid #cbd5e1; border-radius: 0.75rem; background: #ffffff; margin-top: 1rem; position: relative; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; color: #1e293b; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: bold; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #334155; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-800 text-white shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">🦞</span>
                <span class="font-extrabold text-xl tracking-tight">智能光纤前勘系统 4.0</span>
                <span class="text-[10px] bg-sky-500 px-2 py-0.5 rounded font-bold uppercase">Multi-Path Engine</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[1600px] mx-auto px-4 py-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- 左侧面板 -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-3 flex items-center text-slate-700">🔍 地址快速定位</h3>
                <div class="flex space-x-2">
                    <input type="text" id="addressInput" class="flex-1 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-sky-500 outline-none" placeholder="大厦或园区名称">
                    <button onclick="searchAddress()" class="bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-sky-700">定位</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-3 flex items-center text-slate-700">📍 坐标与算路设置</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="lonInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="经度">
                    <input type="number" id="latInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="纬度">
                </div>
                <div class="flex items-center mb-4 space-x-2 text-xs text-slate-500">
                    <input type="checkbox" id="gcj02Toggle" class="w-4 h-4">
                    <label for="gcj02Toggle" class="cursor-pointer">GCJ-02 (火星坐标) 纠偏</label>
                </div>
                <select id="networkType" class="w-full border rounded-lg p-2 text-sm mb-4 bg-slate-50">
                    <option value="PTN">PTN 分组传送网</option>
                    <option value="OTN">OTN 光传送网</option>
                </select>
                <button onclick="calculateRoute()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 shadow-lg hover:shadow-emerald-200/50 transition-all">🚀 启动全路径前勘</button>
            </div>

            <div id="map" class="map-container rounded-xl border border-slate-200 shadow-sm"></div>
        </div>

        <!-- 右侧报告面板 -->
        <div class="lg:col-span-9 bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-y-auto min-h-[800px]">
            <div id="reportContainer">
                <div class="flex flex-col items-center justify-center h-[600px] text-slate-300">
                    <span class="text-6xl mb-4">🗺️</span>
                    <p class="text-xl font-medium">请设定目标点以生成多路径交互拓扑报告</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const map = L.map('map').setView([22.5428, 114.0531], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        map.on('click', e => {
            document.getElementById('latInput').value = e.latlng.lat.toFixed(6);
            document.getElementById('lonInput').value = e.latlng.lng.toFixed(6);
            if(marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
        });

        async function searchAddress() {
            const addr = document.getElementById('addressInput').value;
            if(!addr) return;
            const res = await fetch('/api/geocode', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:addr})});
            const data = await res.json();
            if(data.lon) {
                document.getElementById('lonInput').value = data.lon;
                document.getElementById('latInput').value = data.lat;
                if(marker) map.removeLayer(marker);
                marker = L.marker([data.lat, data.lon]).addTo(map);
                map.setView([data.lat, data.lon], 16);
            }
        }

        async function calculateRoute() {
            const container = document.getElementById('reportContainer');
            container.innerHTML = '<div class="flex flex-col items-center justify-center h-[600px] text-slate-500"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600 mb-4"></div><p>正在执行路网寻踪并构建多路径拓扑...</p></div>';
            
            try {
                const res = await fetch('/api/plan', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({
                        lon: document.getElementById('lonInput').value,
                        lat: document.getElementById('latInput').value,
                        is_gcj02: document.getElementById('gcj02Toggle').checked,
                        type: document.getElementById('networkType').value
                    })
                });
                const result = await res.json();
                renderReport(result);
            } catch(e) {
                container.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg">计算失败: ${e.message}</div>`;
            }
        }

        function renderReport(data) {
            const container = document.getElementById('reportContainer');
            container.innerHTML = ""; 

            // 1. 概述
            const header = document.createElement('div');
            header.className = "markdown-body mb-8";
            header.innerHTML = marked.parse(data.markdown);
            container.appendChild(header);

            // 2. 候选方案循环
            const candidates = data.raw_json.fap_to_equipment_candidates;
            candidates.forEach((cand, i) => {
                const card = document.createElement('div');
                card.className = "mb-12 p-6 bg-slate-50 rounded-2xl border border-slate-200 relative";
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-2xl font-black text-slate-800 m-0">方案 ${i+1}: ${cand.fap_name}</h2>
                        <span class="bg-white px-3 py-1 rounded-full text-xs font-bold border border-slate-200 text-slate-500 shadow-sm">
                            FAP 距离中心点: ${cand.distance_to_query_point_meters}m
                        </span>
                    </div>
                    <div class="text-sm text-slate-500 mb-2 italic">提示：可自由拖动节点调整布局，连线长度可随拖拽拉伸。</div>
                    <div class="network-container shadow-xl" id="net_combined_${i}"></div>
                `;
                container.appendChild(card);
                renderCombinedNetwork(document.getElementById(`net_combined_${i}`), cand);
            });
        }

        function renderCombinedNetwork(container, cand) {
            const nodes = [];
            const edges = [];
            const nodeIds = new Set();

            function clean(s) { return String(s).replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ''); }

            function addNode(name, type, isEnd = false) {
                const id = clean(name);
                if (!nodeIds.has(id)) {
                    let color = '#94a3b8'; // 中间节点：灰色
                    let border = '#64748b';
                    let label = name;
                    
                    if (type === 'fap') { 
                        color = '#3b82f6'; // 起点：蓝色
                        border = '#1d4ed8'; 
                    } else if (isEnd) { 
                        color = '#10b981'; // 终点：绿色
                        border = '#047857'; 
                    }

                    nodes.push({
                        id: id,
                        label: label,
                        shape: 'dot', // 改为圆点
                        size: 15,
                        font: { 
                            size: 12, 
                            face: 'Inter', 
                            color: '#334155',
                            vadjust: -35 // 将文字标注放在圆点上方
                        },
                        color: { 
                            background: color, 
                            border: border, 
                            highlight: { background: color, border: border } 
                        },
                        borderWidth: 2,
                        shadow: { enabled: true, color: 'rgba(0,0,0,0.1)', size: 3, x: 1, y: 1 }
                    });
                    nodeIds.add(id);
                }
                return id;
            }

            // 处理所有 A 和 B 方案
            const plans = [...(cand.equipment_routing_plans || []), ...(cand.transmission_room_routing_plans || [])];
            
            plans.forEach((plan, pIdx) => {
                if(!plan || plan.status !== 'success') return;
                const pathParts = plan.routing.split('->');
                
                pathParts.forEach((p, idx) => {
                    // 核心修复：更鲁棒的节点名称提取逻辑，防止同一个点因为标注不同产生多个分身
                    let name = p;
                    if (p.includes(')-')) {
                        name = p.split(')-').pop();
                    }
                    if (name.includes(' (目标网元')) {
                        name = name.split(' (目标网元')[0];
                    }
                    // 进一步清洗名称，确保起点在所有路径中 ID 绝对一致
                    name = name.trim();

                    const isFap = (idx === 0);
                    const isEnd = (idx === pathParts.length - 1);
                    const nodeId = addNode(name, isFap ? 'fap' : 'mid', isEnd);

                    if (idx > 0) {
                        let prevName = pathParts[idx-1];
                        if (prevName.includes(')-')) {
                            prevName = prevName.split(')-').pop();
                        }
                        prevName = prevName.trim();
                        const prevId = clean(prevName);
                        
                        // 连线信息提取
                        const edgeInfo = plan.path_details[idx-1];
                        const label = `${edgeInfo.空闲数量}/${edgeInfo.中继纤芯数量}\n${edgeInfo.长度}m`;
                        
                        // 连线重复性检查
                        const edgeExists = edges.some(e => e.from === prevId && e.to === nodeId);
                        if (!edgeExists) {
                            edges.push({
                                from: prevId,
                                to: nodeId,
                                label: label,
                                font: { size: 10, align: 'middle', color: '#059669', background: 'rgba(255,255,255,0.7)' },
                                arrows: 'to',
                                color: { color: '#10b981', opacity: 0.6 },
                                width: 2,
                                smooth: { enabled: false } // 改为直线
                            });
                        }
                    }
                });
            });

            new vis.Network(container, { nodes, edges }, {
                physics: { 
                    enabled: true, 
                    solver: 'repulsion',
                    repulsion: { nodeDistance: 200, centralGravity: 0.1, springLength: 200, damping: 0.4 },
                    stabilization: { iterations: 100 }
                },
                interaction: { dragNodes: true, dragView: true, zoomView: true, hover: true }
            });
            
            // 关键：稳定后禁用物理引擎，实现“自由拉伸”且不回弹
            const network = new vis.Network(container, { nodes, edges }, {
                physics: { enabled: true, stabilization: { iterations: 200 } }
            });
            network.on("stabilizationIterationsDone", function () {
                network.setOptions({ physics: false });
            });
        }
    </script>
</body>
</html>
