<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能光纤前勘 4.5 | 修正版</title>
    <!-- 引入国内加速的静态资源 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        .map-container { height: 350px; width: 100%; border-radius: 0.5rem; background: #eee; }
        .network-container { height: 600px; width: 100%; border: 1px solid #cbd5e1; border-radius: 0.75rem; background: #ffffff; margin-top: 1rem; position: relative; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; color: #1e293b; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: bold; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #334155; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 0.5rem; text-align: left; }
        .markdown-body th { background: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-800 text-white shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">🦞</span>
                <span class="font-extrabold text-xl tracking-tight">智能光纤前勘系统 4.5</span>
                <span class="text-[10px] bg-sky-500 px-2 py-0.5 rounded font-bold uppercase">Stability Fixed</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[1600px] mx-auto px-4 py-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-3 flex items-center text-slate-700">🔍 地址定位</h3>
                <div class="flex space-x-2">
                    <input type="text" id="addressInput" class="flex-1 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-sky-500 outline-none" placeholder="大厦或园区名称">
                    <button onclick="searchAddress()" class="bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-sky-700">定位</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-3 flex items-center text-slate-700">📍 算路设置</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="lonInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="经度">
                    <input type="number" id="latInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="纬度">
                </div>
                <select id="networkType" class="w-full border rounded-lg p-2 text-sm mb-4 bg-slate-50">
                    <option value="PTN">PTN 分组传送网</option>
                    <option value="OTN">OTN 光传送网</option>
                </select>
                <button id="calcBtn" onclick="calculateRoute()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 shadow-lg transition-all">🚀 启动全路径前勘</button>
            </div>

            <div id="map" class="map-container border border-slate-200 shadow-sm"></div>
        </div>

        <div class="lg:col-span-9 bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-y-auto min-h-[800px]">
            <div id="reportContainer">
                <div class="flex flex-col items-center justify-center h-[600px] text-slate-300">
                    <span class="text-6xl mb-4">🗺️</span>
                    <p class="text-xl font-medium">请设定目标点以生成交互拓扑报告</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 延迟初始化确保 Leaflet 加载
        let map, marker;
        function initMap() {
            try {
                map = L.map('map').setView([22.5428, 114.0531], 13);
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    maxZoom: 18,
                    attribution: '© AutoNavi'
                }).addTo(map);

                map.on('click', e => {
                    document.getElementById('latInput').value = e.latlng.lat.toFixed(6);
                    document.getElementById('lonInput').value = e.latlng.lng.toFixed(6);
                    if(marker) map.removeLayer(marker);
                    marker = L.marker(e.latlng).addTo(map);
                });
                console.log("Map initialized successfully");
            } catch (e) {
                console.error("Map init error:", e);
                document.getElementById('map').innerHTML = "<div class='p-4 text-red-500'>地图加载失败，请刷新页面重试。</div>";
            }
        }

        window.onload = initMap;

        async function searchAddress() {
            const addr = document.getElementById('addressInput').value;
            if(!addr) return;
            const res = await fetch('/api/geocode', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:addr})});
            const data = await res.json();
            if(data.lon) {
                document.getElementById('lonInput').value = data.lon;
                document.getElementById('latInput').value = data.lat;
                if(marker) map.removeLayer(marker);
                marker = L.marker([data.lat, data.lon]).addTo(map);
                map.setView([data.lat, data.lon], 16);
            }
        }

        async function calculateRoute() {
            const container = document.getElementById('reportContainer');
            container.innerHTML = '<div class="flex flex-col items-center justify-center h-[600px] text-slate-500"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600 mb-4"></div><p>路网寻踪中...</p></div>';
            
            try {
                const res = await fetch('/api/plan', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({
                        lon: document.getElementById('lonInput').value,
                        lat: document.getElementById('latInput').value,
                        type: document.getElementById('networkType').value
                    })
                });
                const result = await res.json();
                renderReport(result);
            } catch(e) {
                container.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg">计算失败: ${e.message}</div>`;
            }
        }

        function renderReport(data) {
            const container = document.getElementById('reportContainer');
            container.innerHTML = ""; 
            const header = document.createElement('div');
            header.className = "markdown-body mb-8";
            header.innerHTML = marked.parse(data.markdown);
            container.appendChild(header);

            data.raw_json.fap_to_equipment_candidates.forEach((cand, i) => {
                const card = document.createElement('div');
                card.className = "mb-12 p-6 bg-slate-50 rounded-2xl border border-slate-200";
                card.innerHTML = `
                    <h2 class="text-2xl font-black text-slate-800 mb-4">方案 ${i+1}: ${cand.fap_name}</h2>
                    <div class="network-container shadow-xl" id="net_combined_${i}"></div>
                `;
                container.appendChild(card);
                renderCombinedNetwork(document.getElementById(`net_combined_${i}`), cand);
            });
        }

        function renderCombinedNetwork(container, cand) {
            const nodes = [], edges = [], nodeIds = new Set();
            const clean = s => String(s).replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').trim();

            function addNode(name, type, isEnd) {
                let cleanName = name.replace(/\(.*\)/g, '').split(')-').pop().split(' (目标')[0].trim();
                const id = clean(cleanName);
                if (!nodeIds.has(id)) {
                    nodes.push({
                        id: id, label: cleanName, shape: 'dot', size: 15,
                        font: { size: 12, vadjust: -35 },
                        color: type === 'fap' ? '#3b82f6' : (isEnd ? '#10b981' : '#94a3b8')
                    });
                    nodeIds.add(id);
                }
                return id;
            }

            const plans = [...(cand.equipment_routing_plans || []), ...(cand.transmission_room_routing_plans || [])];
            plans.forEach(plan => {
                if(!plan || plan.status !== 'success') return;
                const pathParts = plan.routing.split('->');
                pathParts.forEach((p, idx) => {
                    const nodeId = addNode(p, idx === 0 ? 'fap' : 'mid', idx === pathParts.length - 1);
                    if (idx > 0) {
                        const prevId = clean(pathParts[idx-1].replace(/\(.*\)/g, '').split(')-').pop().split(' (目标')[0]);
                        if (!edges.some(e => e.from === prevId && e.to === nodeId)) {
                            const info = plan.path_details[idx-1];
                            edges.push({
                                from: prevId, to: nodeId, 
                                label: `${info.空闲数量}芯\n${info.长度}m`,
                                font: { size: 10, align: 'middle' },
                                arrows: 'to', color: '#10b981', width: 2, smooth: false
                            });
                        }
                    }
                });
            });

            const network = new vis.Network(container, { nodes, edges }, {
                physics: { enabled: true, stabilization: { iterations: 200 } },
                interaction: { dragNodes: true, dragView: true, zoomView: true }
            });
            network.on("stabilizationIterationsDone", () => network.setOptions({ physics: false }));
        }
    </script>
</body>
</html>
