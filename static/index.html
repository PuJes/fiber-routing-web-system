<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能光纤前勘系统 3.0 | Vis Network 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 Vis-Network 开源拓扑插件 -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        .map-container { height: 300px; width: 100%; border-radius: 0.5rem; }
        .network-container { height: 400px; width: 100%; border: 1px solid #e5e7eb; border-radius: 0.5rem; background: #f8fafc; margin-bottom: 1.5rem; position: relative; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.875rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; }
        .markdown-body th { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen flex flex-col">
    <nav class="bg-indigo-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-3xl">🦞</span>
                <span class="font-bold text-xl">智能光纤前勘 3.0</span>
                <span class="text-xs bg-indigo-500 px-2 py-1 rounded">Vis-Network 拓扑增强版</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- 左侧面板 -->
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold mb-3 flex items-center"><span class="mr-2">🔍</span>地址解析</h3>
                <div class="flex space-x-2">
                    <input type="text" id="addressInput" class="flex-1 border rounded-lg p-2 text-sm" placeholder="搜索大厦/园区...">
                    <button onclick="searchAddress()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium">解析</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold mb-3 flex items-center"><span class="mr-2">📍</span>坐标与网络</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="lonInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="经度">
                    <input type="number" id="latInput" step="0.000001" class="border rounded-lg p-2 text-sm" placeholder="纬度">
                </div>
                <select id="networkType" class="w-full border rounded-lg p-2 text-sm mb-4">
                    <option value="PTN">PTN 网络</option>
                    <option value="OTN">OTN 网络</option>
                </select>
                <button onclick="calculateRoute()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 shadow-md transition-all">🚀 启动算路</button>
            </div>

            <div id="map" class="map-container shadow-inner border border-gray-200"></div>
        </div>

        <!-- 右侧报告面板 -->
        <div class="lg:col-span-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200 overflow-y-auto">
            <div id="reportContainer" class="markdown-body">
                <div class="text-center py-20 text-gray-400">
                    请在左侧设定目标点并启动算路
                </div>
            </div>
        </div>
    </main>

    <script>
        const map = L.map('map').setView([22.5428, 114.0531], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        map.on('click', e => {
            document.getElementById('latInput').value = e.latlng.lat.toFixed(6);
            document.getElementById('lonInput').value = e.latlng.lng.toFixed(6);
            if(marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
        });

        async function searchAddress() {
            const addr = document.getElementById('addressInput').value;
            const res = await fetch('/api/geocode', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:addr})});
            const data = await res.json();
            if(data.lon) {
                document.getElementById('lonInput').value = data.lon;
                document.getElementById('latInput').value = data.lat;
                const pos = [data.lat, data.lon];
                if(marker) map.removeLayer(marker);
                marker = L.marker(pos).addTo(map);
                map.setView(pos, 16);
            }
        }

        async function calculateRoute() {
            const reportBox = document.getElementById('reportContainer');
            reportBox.innerHTML = '<div class="text-center py-20">正在计算双轨路由...</div>';
            
            try {
                const res = await fetch('/api/plan', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({
                        lon: document.getElementById('lonInput').value,
                        lat: document.getElementById('latInput').value,
                        type: document.getElementById('networkType').value
                    })
                });
                const result = await res.json();
                renderReport(result);
            } catch(e) {
                reportBox.innerHTML = `<div class="text-red-500">请求失败: ${e.message}</div>`;
            }
        }

        function renderReport(data) {
            const container = document.getElementById('reportContainer');
            container.innerHTML = ""; // 清空

            // 1. 概述
            const header = document.createElement('div');
            header.className = "markdown-body";
            header.innerHTML = marked.parse(data.markdown.split('---')[0]);
            container.appendChild(header);

            // 2. 循环处理每一个候选方案
            const candidates = data.raw_json.fap_to_equipment_candidates;
            candidates.forEach((cand, i) => {
                const candDiv = document.createElement('div');
                candDiv.className = "mt-8 p-4 border-l-4 border-indigo-500 bg-gray-50 rounded-r-lg";
                candDiv.innerHTML = `<h2 class="text-xl font-bold text-indigo-800">方案 ${i+1}: ${cand.fap_name}</h2>
                                     <p class="text-sm text-gray-600 mb-4">距离起点: ${cand.distance_to_query_point_meters} 米</p>`;
                container.appendChild(candDiv);

                // 渲染子方案 A 和 B
                renderSubPlan(candDiv, cand.equipment_routing_plan, "🌟 子方案 A: 绝对最近接入");
                renderSubPlan(candDiv, cand.transmission_room_routing_plan, "🛡️ 子方案 B: 高可靠传输机房接入");
            });
        }

        function renderSubPlan(parent, plan, title) {
            if(!plan || plan.status !== 'success') return;

            const div = document.createElement('div');
            div.className = "mt-6";
            div.innerHTML = `<h3 class="font-bold text-lg mb-2">${title}</h3>
                             <ul class="text-sm mb-4 space-y-1">
                                <li>• <b>跳数</b>: ${plan.jumps}</li>
                                <li>• <b>总距离</b>: ${plan.distance_meters} 米</li>
                                <li>• <b>终点</b>: ${plan.found_at_node}</li>
                             </ul>
                             <div class="network-container" id="net_${Math.random().toString(36).substr(2,9)}"></div>`;
            parent.appendChild(div);

            const netContainer = div.querySelector('.network-container');
            
            // 构建 Vis Network 数据
            const nodes = [];
            const edges = [];
            
            if(plan.jumps === 0) {
                nodes.push({id: 1, label: '🔌 起点/机房直连', shape: 'box', color: '#e1f5fe', font: {size: 14}});
            } else {
                // 简单的从路由字符串解析
                const parts = plan.routing.split('->');
                parts.forEach((p, idx) => {
                    const nodeName = p.split(')-').pop() || p;
                    nodes.push({
                        id: idx, 
                        label: (idx === 0 ? "🔌 " : "🏠 ") + nodeName, 
                        shape: 'dot',
                        size: 20,
                        color: idx === 0 ? '#3b82f6' : (idx === parts.length - 1 ? '#10b981' : '#94a3b8')
                    });
                    if(idx > 0) {
                        edges.push({
                            from: idx - 1, 
                            to: idx, 
                            label: '光缆', 
                            arrows: 'to', 
                            color: {color:'#10b981', highlight:'#059669'},
                            width: 3
                        });
                    }
                });
            }

            new vis.Network(netContainer, {nodes, edges}, {
                nodes: { font: { face: 'Inter' } },
                edges: { font: { align: 'top' } },
                physics: { 
                    enabled: false, // 禁用物理引擎，防止拖拽时群魔乱舞
                    stabilization: true 
                },
                layout: {
                    hierarchical: {
                        enabled: true,
                        direction: 'LR', // 从左到右排列
                        sortMethod: 'directed',
                        levelSeparation: 200,
                        nodeSpacing: 150
                    }
                },
                interaction: {
                    dragNodes: true,
                    dragView: true,
                    zoomView: true
                }
            });
        }
    </script>
</body>
</html>
